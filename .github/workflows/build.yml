name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip TikTokAutoScroll.zip

      - name: Generate gradlew
        run: |
          cd TikTokAutoScroll
          gradle wrapper --gradle-version 8.2
        env:
          GRADLE_VERSION: '8.2'

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build APK
        run: |
          cd TikTokAutoScroll
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TikTokAutoScroll
          path: TikTokAutoScroll/app/build/outputs/apk/debug/app-debug.apk
