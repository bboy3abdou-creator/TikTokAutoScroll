name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Unzip project
        run: unzip TikTokAutoScroll.zip

      - name: Add gradle.properties
        run: |
          echo "android.useAndroidX=true" >> TikTokAutoScroll/gradle.properties
          echo "android.enableJetifier=true" >> TikTokAutoScroll/gradle.properties

      - name: Build APK
        run: |
          cd TikTokAutoScroll
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TikTokAutoScroll
          path: "**/app-debug.apk"
